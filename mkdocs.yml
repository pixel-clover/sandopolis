site_name: Sandopolis Documentation
site_description: Documentation for the Sandopolis Sega Genesis/Mega Drive emulator
repo_url: https://github.com/pixel-clover/sandopolis
repo_name: pixel-clover/sandopolis
site_url: https://pixel-clover.github.io/sandopolis/
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep blue
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep blue
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pixel-clover/sandopolis

plugins:
  - search

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Controls: controls.md
  - Public API: core-api.md
  - Compatibility: compatibility.md

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true
