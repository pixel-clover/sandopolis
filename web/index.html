<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sandopolis - Sega Genesis Emulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0D1117;
    color: #E6EDF3;
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px;
  }

  h1 { color: #F7A41D; font-size: 2rem; letter-spacing: 0.15em; margin-bottom: 4px; }
  .subtitle { color: #8B949E; font-size: 0.85rem; margin-bottom: 16px; }

  #drop-zone {
    border: 2px dashed #5B8DBE;
    border-radius: 8px;
    padding: 16px 32px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 12px;
    transition: border-color 0.2s, background 0.2s;
    max-width: 660px; width: 100%;
  }
  #drop-zone:hover, #drop-zone.drag-over {
    border-color: #F7A41D; background: rgba(247,164,29,0.06);
  }
  #drop-zone label { color: #6EB8D4; cursor: pointer; font-size: 0.9rem; }
  #rom-input { display: none; }

  .toolbar {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    justify-content: center; margin-bottom: 8px; max-width: 660px;
  }
  .toolbar button, .toolbar select {
    background: #161B22; color: #E6EDF3; border: 1px solid #30363D;
    border-radius: 4px; padding: 4px 10px; font-family: inherit;
    font-size: 0.75rem; cursor: pointer;
  }
  .toolbar button:hover { border-color: #F7A41D; }
  .toolbar .sep { width: 1px; height: 20px; background: #30363D; }

  #screen-container {
    position: relative;
    background: #000; border: 2px solid #5B8DBE;
    border-radius: 4px; overflow: hidden; margin-bottom: 8px;
  }
  #screen {
    display: block; width: 640px; height: 480px;
    image-rendering: pixelated; image-rendering: crisp-edges;
  }

  #toast {
    position: fixed; top: 20px; right: 20px;
    background: #161B22; border: 1px solid #F7A41D;
    border-radius: 4px; padding: 8px 16px;
    font-size: 0.8rem; color: #F7A41D;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 100;
  }
  #toast.visible { opacity: 1; }

  #status { color: #8B949E; font-size: 0.8rem; margin-bottom: 12px; text-align: center; }

  #settings-panel {
    max-width: 660px; width: 100%;
    background: #161B22; border: 1px solid #30363D;
    border-radius: 6px; padding: 12px 16px; margin-bottom: 16px;
  }
  #settings-panel.hidden { display: none; }
  #settings-panel h3 { color: #6EB8D4; font-size: 0.8rem; margin-bottom: 8px; }

  .settings-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px 16px; font-size: 0.78rem; align-items: center;
  }
  .settings-grid label { color: #8B949E; }
  .settings-grid select, .settings-grid input[type=range] {
    background: #0D1117; color: #E6EDF3; border: 1px solid #30363D;
    border-radius: 3px; padding: 2px 6px; font-family: inherit; font-size: 0.75rem;
    width: 100%;
  }
  .volume-row { display: flex; align-items: center; gap: 6px; }
  .volume-row input { flex: 1; }
  .volume-row span { color: #8B949E; font-size: 0.7rem; min-width: 3.5em; text-align: right; }

  .controls {
    max-width: 660px; width: 100%;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 4px 24px; font-size: 0.75rem; color: #8B949E; margin-bottom: 16px;
  }
  .controls .section-title { color: #6EB8D4; font-weight: bold; grid-column: span 2; margin-top: 4px; }
  .controls .key {
    display: inline-block; background: #161B22; border: 1px solid #30363D;
    border-radius: 3px; padding: 1px 5px; color: #E6EDF3; font-size: 0.7rem;
  }

  footer { margin-top: auto; padding-top: 16px; font-size: 0.75rem; color: #8B949E; }
  footer a { color: #5B8DBE; text-decoration: none; }
  footer a:hover { color: #F7A41D; }

  @media (max-width: 700px) {
    #screen { width: 100%; height: auto; aspect-ratio: 4/3; }
    .controls { grid-template-columns: 1fr; }
    .controls .section-title { grid-column: 1; }
    .settings-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>SANDOPOLIS</h1>
<p class="subtitle">Sega Genesis / Mega Drive Emulator</p>

<div id="drop-zone">
  <label for="rom-input">Drop a ROM file here or <u>click to browse</u></label>
  <input type="file" id="rom-input" accept=".bin,.md,.smd,.gen">
</div>

<div class="toolbar">
  <button id="audio-toggle">AUDIO ON</button>
  <div class="sep"></div>
  <button id="btn-quick-save">QUICK SAVE</button>
  <button id="btn-quick-load">QUICK LOAD</button>
  <div class="sep"></div>
  <button id="btn-save">SAVE</button>
  <button id="btn-load">LOAD</button>
  <select id="slot-select">
    <option value="1">SLOT 1</option>
    <option value="2">SLOT 2</option>
    <option value="3">SLOT 3</option>
  </select>
  <div class="sep"></div>
  <button id="settings-toggle">SETTINGS</button>
</div>

<div id="settings-panel" class="hidden">
  <h3>SETTINGS</h3>
  <div class="settings-grid">
    <label>Audio Mode</label>
    <select id="audio-mode">
      <option value="0">Normal</option>
      <option value="1">FM Only</option>
      <option value="2">PSG Only</option>
      <option value="3">Unfiltered</option>
    </select>

    <label>PSG Volume</label>
    <div class="volume-row">
      <input type="range" id="psg-volume" min="0" max="200" value="150" step="10">
      <span id="psg-volume-label">150%</span>
    </div>

    <label>Controller</label>
    <select id="controller-type">
      <option value="1">6-Button</option>
      <option value="0">3-Button</option>
    </select>
  </div>
</div>

<div id="screen-container">
  <canvas id="screen" width="320" height="224"></canvas>
</div>

<p id="status">Loading emulator...</p>

<div id="toast"></div>

<div class="controls">
  <div class="section-title">CONTROLS</div>
  <div><span class="key">Arrows</span> D-Pad</div>
  <div><span class="key">Enter</span> Start</div>
  <div><span class="key">Z</span> A &nbsp; <span class="key">X</span> B &nbsp; <span class="key">C</span> C</div>
  <div><span class="key">A</span> X &nbsp; <span class="key">S</span> Y &nbsp; <span class="key">D</span> Z</div>
  <div class="section-title">SAVE STATES</div>
  <div><span class="key">F5</span> Quick Save &nbsp; <span class="key">F8</span> Quick Load</div>
  <div><span class="key">F6</span> Save Slot &nbsp; <span class="key">F9</span> Load Slot</div>
</div>

<footer>
  <a href="https://pixel-clover.github.io/sandopolis/">Sandopolis Documentation</a>
</footer>

<script src="sandopolis.js"></script>
</body>
</html>
