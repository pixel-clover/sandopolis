name: Create Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  call_tests:
    uses: ./.github/workflows/tests.yml

  create-release:
    name: Create release
    runs-on: ubuntu-latest

    # Try to publish only if the tests pass
    needs: call_tests
    if: success()

    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create temporary tag for draft
        # Only create a temporary tag when triggered by a push (don't create tags for manual workflow_dispatch runs)
        if: github.event_name == 'push' && github.ref_type != 'tag'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG_NAME="draft-${{ github.ref_name }}-$(date +%s)"
          echo "DRAFT_TAG=$TAG_NAME" >> $GITHUB_ENV
          git tag $TAG_NAME
          git push origin $TAG_NAME

      - name: Set release tag
        run: |
          # Prefer an existing tag if this run was for a tag. If we created a DRAFT_TAG (on push), use it.
          # For manual runs (workflow_dispatch) we intentionally do NOT create a git tag; instead use
          # a synthetic tag name based on the workflow run id so the release has a stable name.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          elif [ -n "${{ env.DRAFT_TAG }}" ]; then
            echo "RELEASE_TAG=${{ env.DRAFT_TAG }}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=manual-${{ github.run_id }}" >> $GITHUB_ENV
          fi

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          release_name: Release ${{ env.RELEASE_TAG }}
          draft: ${{ github.ref_type != 'tag' }}
          prerelease: true

  build-and-upload:
    name: Build and upload
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            artifact_name: sandopolis-linux-x86_64.gz
            asset_content_type: application/gzip
          - os: ubuntu-24.04-arm
            target: aarch64-linux-gnu
            artifact_name: sandopolis-linux-aarch64.gz
            asset_content_type: application/gzip
          - os: macos-latest
            target: ""
            artifact_name: sandopolis-macos-aarch64.gz
            asset_content_type: application/gzip
          - os: windows-latest
            target: x86_64-windows-gnu
            artifact_name: sandopolis-windows-x86_64.zip
            asset_content_type: application/zip
          - os: windows-latest
            target: aarch64-windows-gnu
            artifact_name: sandopolis-windows-aarch64.zip
            asset_content_type: application/zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Determine Zig version
        id: zigver
        # shell must be bash: the Windows runner defaults to pwsh, where
        # $GITHUB_OUTPUT does not expand and the empty version silently
        # installs zig master.
        shell: bash
        run: |
          version="$(sed -n 's/.*\.minimum_zig_version = "\(.*\)".*/\1/p' build.zig.zon)"
          if [ -z "$version" ]; then
            echo "Failed to read minimum_zig_version from build.zig.zon" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ steps.zigver.outputs.version }}

      - name: Set build metadata
        id: build_meta
        shell: bash
        run: |
          echo "git_branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "git_hash=${GITHUB_SHA::5}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Build the binary (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }} \
              -Dgit-branch="${{ steps.build_meta.outputs.git_branch }}" \
              -Dgit-hash="${{ steps.build_meta.outputs.git_hash }}" \
              -Dbuild-time="${{ steps.build_meta.outputs.build_time }}"
          else
            zig build -Doptimize=ReleaseFast \
              -Dgit-branch="${{ steps.build_meta.outputs.git_branch }}" \
              -Dgit-hash="${{ steps.build_meta.outputs.git_hash }}" \
              -Dbuild-time="${{ steps.build_meta.outputs.build_time }}"
          fi

      - name: Build the binary (Windows)
        if: runner.os == 'Windows'
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }} -Dgit-branch="${{ steps.build_meta.outputs.git_branch }}" -Dgit-hash="${{ steps.build_meta.outputs.git_hash }}" -Dbuild-time="${{ steps.build_meta.outputs.build_time }}"

      - name: Verify built binary exists (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ ! -f zig-out/bin/sandopolis ]; then
            echo "ERROR: built binary zig-out/bin/sandopolis not found"
            ls -lR zig-out/ || true
            exit 1
          fi

      - name: Verify built binary exists (Windows)
        if: runner.os == 'Windows'
        run: |
          if (!(Test-Path "zig-out\\bin\\sandopolis.exe")) {
            Write-Host 'ERROR: built binary zig-out\\bin\\sandopolis.exe not found'
            dir zig-out\\bin
            exit 1
          }

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          gzip -c zig-out/bin/sandopolis > "${{ matrix.artifact_name }}"

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:RELEASE_DIR = "release-${{ matrix.target }}-${{ github.run_id }}"
          New-Item -ItemType Directory -Path $env:RELEASE_DIR -Force | Out-Null
          Copy-Item zig-out\bin\sandopolis.exe $env:RELEASE_DIR\
          Copy-Item zig-out\bin\SDL3.dll $env:RELEASE_DIR\ -ErrorAction SilentlyContinue
          Compress-Archive -Path "$env:RELEASE_DIR\*" -DestinationPath ${{ matrix.artifact_name }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.artifact_name }}
          asset_name: ${{ matrix.artifact_name }}
          asset_content_type: ${{ matrix.asset_content_type }}

  # Per-platform build on native runners. Each job pushes a digest-only image
  # without tags. The merge job below combines digests into a single manifest
  # list and applies the canonical tags.
  build-image:
    name: Build Docker image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: call_tests
    if: success()

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sandopolis-web

      - name: Set build metadata
        id: build_meta
        shell: bash
        run: |
          echo "git_branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "git_hash=${GITHUB_SHA::5}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            SANDOPOLIS_GIT_BRANCH=${{ steps.build_meta.outputs.git_branch }}
            SANDOPOLIS_GIT_HASH=${{ steps.build_meta.outputs.git_hash }}
            SANDOPOLIS_BUILD_TIME=${{ steps.build_meta.outputs.build_time }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/sandopolis-web,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-image:
    name: Merge Docker image manifest
    runs-on: ubuntu-latest
    needs: build-image
    if: success()

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sandopolis-web
          # `latest` is reserved for actual tag pushes; manual workflow_dispatch
          # runs publish under `develop` instead so they cannot overwrite a
          # released image.
          tags: |
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=develop,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=ref,event=tag

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/sandopolis-web@sha256:%s ' *)

      - name: Inspect image
        if: steps.meta.outputs.version != ''
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/sandopolis-web:${{ steps.meta.outputs.version }}
