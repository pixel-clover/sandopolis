name: Publish Sandopolis Web

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Build WebAssembly module
        run: zig build wasm

      - name: Prepare publish directory
        run: |
          mkdir -p ./publish/img
          cp ./web/index.html ./web/sandopolis.js ./web/audio-worklet.js ./publish/
          cp -r ./web/img/* ./publish/img/
          cp ./zig-out/web/sandopolis.wasm ./publish/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          publish_branch: gh-pages
          user_name: ${{ github.actor }}
          user_email: ${{ github.actor }}@users.noreply.github.com
          commit_message: "web: Deploy Sandopolis Web from ${{ github.sha }}"
